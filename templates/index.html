<!doctype html>
<html>
  <head>
    <title>Fake News Detection</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 50px;
        background-color: #f9f9f9;
      }
      .form-container {
        max-width: 600px; /* Thoda wide kiya hai taaki text aaram se dikhe */
        margin: auto;
        padding: 30px;
        border: 1px solid #ccc;
        border-radius: 10px;
        background-color: white;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }
      .form-container h2 {
        text-align: center;
        color: #333;
      }
      .form-container textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0 20px 0;
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
        resize: vertical; /* User textbox ko bada kar sakta hai */
        font-family: Arial, sans-serif;
      }
      .form-container input[type="submit"] {
        background-color: #007bff; /* Button ka color thoda modern kiya hai */
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }
      .form-container input[type="submit"]:hover {
        background-color: #0056b3;
      }
      .result {
        font-size: 1.5em;
        text-align: center;
        margin-top: 25px;
        padding: 10px;
        font-weight: bold;
        border-radius: 5px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>📰 Fake News Detection System</h2>
      <form action="/predict" method="post">
        <label for="news_input">Enter News Article Text:</label>
        <textarea
          name="news_input"
          id="news_input"
          rows="8"
          placeholder="Paste the news article here to check if it's real or fake..."
          required
        ></textarea>

        <input type="submit" value="Check News" />
      </form>

      {% if prediction_text %}
      <div class="result">{{ prediction_text }}</div>
      {% endif %}
    </div>
  </body>
</html>
